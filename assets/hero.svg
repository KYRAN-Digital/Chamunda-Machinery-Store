<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="180" y1="60" x2="1420" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B2A3F" />
      <stop offset="0.55" stop-color="#0B1220" />
      <stop offset="1" stop-color="#07341F" />
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 120) rotate(35) scale(520 340)">
      <stop stop-color="#38BDF8" stop-opacity="0.35" />
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 140) rotate(145) scale(560 380)">
      <stop stop-color="#22C55E" stop-opacity="0.28" />
      <stop offset="1" stop-color="#22C55E" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="drop" x1="760" y1="80" x2="980" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" stop-opacity="0.95" />
      <stop offset="1" stop-color="#22C55E" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)" />
  <rect width="1600" height="600" fill="url(#glow1)" />
  <rect width="1600" height="600" fill="url(#glow2)" />

  <!-- subtle grid -->
  <g opacity="0.12" stroke="#FFFFFF">
    <path d="M0 120H1600" />
    <path d="M0 240H1600" />
    <path d="M0 360H1600" />
    <path d="M0 480H1600" />
    <path d="M200 0V600" />
    <path d="M400 0V600" />
    <path d="M600 0V600" />
    <path d="M800 0V600" />
    <path d="M1000 0V600" />
    <path d="M1200 0V600" />
    <path d="M1400 0V600" />
  </g>

  <!-- big drop + simplified pump -->
  <g opacity="0.32">
    <path
      d="M900 96c48 92 124 146 124 238a124 124 0 0 1-248 0c0-92 76-146 124-238Z"
      fill="url(#drop)"
    />
    <g transform="translate(816 270)">
      <rect x="0" y="34" width="168" height="96" rx="24" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.18)" />
      <rect x="22" y="56" width="124" height="50" rx="16" fill="rgba(255,255,255,0.09)" />
      <circle cx="56" cy="82" r="14" fill="rgba(56,189,248,0.75)" />
      <circle cx="112" cy="82" r="14" fill="rgba(34,197,94,0.75)" />
      <path
        d="M36 34c0-18 16-30 48-30s48 12 48 30"
        stroke="rgba(255,255,255,0.35)"
        stroke-width="6"
        stroke-linecap="round"
      />
    </g>
  </g>

  <!-- headline -->
  <g opacity="0.9">
    <text
      x="120"
      y="220"
      font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial"
      font-size="56"
      font-weight="800"
      fill="rgba(255,255,255,0.92)"
    >
      Chamunda Machinery Store
    </text>
    <text
      x="120"
      y="270"
      font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial"
      font-size="22"
      font-weight="600"
      fill="rgba(255,255,255,0.72)"
    >
      Submersible Pumps · Openwell &amp; Borewell · Sales · Service · Repairing
    </text>
    <text
      x="120"
      y="312"
      font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial"
      font-size="18"
      fill="rgba(255,255,255,0.62)"
    >
      Since 1982 · Somesar, Pali (Rajasthan)
    </text>
  </g>
</svg>

